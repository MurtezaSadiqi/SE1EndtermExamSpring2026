name: Test CI

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]
  workflow_dispatch:

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 40131435/recommendation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install coverage
        run: python -m pip install coverage
      - name: Run unit and acceptance tests
        run: coverage run --source=engine -m unittest discover -s tests -v
      - name: Create CSV coverage report
        run: |
          coverage json -o coverage.json
          python -c "import csv,json; data=json.load(open('coverage.json')); output=open('../coverage_report.csv','w',newline=''); writer=csv.writer(output); writer.writerow(['file','statements','missing','coverage_percent']); writer.writerows((name,item['summary']['num_statements'],item['summary']['missing_lines'],round(item['summary']['percent_covered'],2)) for name,item in data['files'].items()); output.close()"
      - name: Upload CSV coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: 40131435/coverage_report.csv
