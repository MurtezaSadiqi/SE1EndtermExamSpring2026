services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: homestay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homestay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports: ["9200:9200"]

  recommendation:
    build: ./recommendation
    ports: ["8000:8000"]

  backend:
    build: ./backend
    environment:
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-development-secret}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/homestay
      REDIS_URL: redis://redis:6379
      RECOMMENDATION_URL: http://recommendation:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      recommendation:
        condition: service_started
    ports: ["4000:4000"]

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:4000/api
    depends_on: [backend]
    ports: ["5173:5173"]

volumes:
  postgres_data:
